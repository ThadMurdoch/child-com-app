<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyrus Voice Link</title>
    <style>
        body { background: #000; color: #ff0; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }
        #status { background: #333; color: #fff; padding: 15px; font-weight: bold; }
        .phrase { font-size: 2.5rem; padding: 25px; margin: 10px; border: 8px solid #444; border-radius: 15px; transition: 0.1s; }
        .active { border-color: #ff0; background: #222; transform: scale(1.05); box-shadow: 0 0 20px #ff0; }
        #start-btn { width: 90%; padding: 30px; margin: 20px; font-size: 1.5rem; background: #ff0; color: #000; border: none; font-weight: bold; border-radius: 10px; }
        #vid { width: 140px; height: 105px; background: #222; border: 2px solid #0f0; transform: scaleX(-1); margin-top: 5px; }
    </style>
</head>
<body>

<div id="status">VPN ACTIVE? READY TO START</div>
<button id="start-btn" onclick="main()">TAP TO START WITH VOICE</button>

<br>
<video id="vid" autoplay playsinline muted></video>

<div id="phrases">
    <div class="phrase active">YES</div>
    <div class="phrase">NO</div>
    <div class="phrase">HELP</div>
    <div class="phrase">HUNGRY</div>
</div>

<script type="module">
    import { FaceLandmarker, FilesetResolver } from "https://unpkg.com/@mediapipe/tasks-vision@0.10.0";

    const status = document.getElementById("status");
    const video = document.getElementById("vid");
    const btn = document.getElementById("start-btn");
    const phrases = document.querySelectorAll(".phrase");

    // Pre-load the voice engine
    const synth = window.speechSynthesis;

    window.main = async function() {
        btn.style.display = "none";
        status.innerText = "Connecting...";

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;

            const res = await FilesetResolver.forVisionTasks("https://unpkg.com/@mediapipe/tasks-vision@0.10.0/wasm");
            const landmarker = await FaceLandmarker.createFromOptions(res, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task" },
                runningMode: "VIDEO"
            });

            status.innerText = "VOICE ACTIVE - OPEN MOUTH TO SPEAK";
            status.style.background = "green";

            let i = 0;
            let lastM = false;
            let lastSpeakTime = 0;

            function loop() {
                const result = landmarker.detectForVideo(video, performance.now());
                if (result.faceLandmarks && result.faceLandmarks[0]) {
                    const p = result.faceLandmarks[0];
                    const mouthDist = Math.abs(p[13].y - p[14].y) * 1000;
                    
                    // Trigger if mouth opens wide AND 2 seconds have passed since last speech
                    if (mouthDist > 35 && !lastM && (Date.now() - lastSpeakTime > 2000)) {
                        
                        // 1. Move the highlight
                        phrases[i].classList.remove("active");
                        i = (i + 1) % phrases.length;
                        phrases[i].classList.add("active");

                        // 2. Speak the phrase
                        const text = phrases[i].innerText;
                        const utter = new SpeechSynthesisUtterance(text);
                        utter.pitch = 1.2; // Slightly higher pitch for a child-like tone
                        utter.rate = 0.9;  // Slightly slower for clarity
                        synth.speak(utter);

                        lastSpeakTime = Date.now();
                        lastM = true;
                    } else if (mouthDist < 20) { 
                        lastM = false; 
                    }
                }
                requestAnimationFrame(loop);
            }
            loop();

        } catch (e) {
            status.innerText = "ERROR: " + e.message;
            status.style.background = "red";
        }
    }
</script>
</body>
</html>
