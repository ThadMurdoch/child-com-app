<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyrus Link</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/face_landmarker_bundle.mjs" type="module"></script>
    <style>
        body { background: black; color: #ffff00; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; height: 100vh; }
        #status-bar { background: #333; color: white; padding: 15px; font-weight: bold; }
        #phrase-list { margin-top: 20px; display: flex; flex-direction: column; align-items: center; height: 60vh; justify-content: center; }
        .phrase { font-size: 3rem; font-weight: bold; padding: 25px; margin: 10px; border: 8px solid transparent; width: 85%; border-radius: 15px; }
        .active { border-color: #ffff00; background: #222; }
        #video-container { position: fixed; top: 60px; right: 10px; width: 120px; border: 1px solid #555; z-index: 100; }
        video { width: 100%; transform: scaleX(-1); }
        #start-btn { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 30px; font-size: 2rem; background: #ffff00; color: black; 
            border: none; border-radius: 10px; z-index: 1000; cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="start-btn">TAP TO START CAMERA</button>
    <div id="status-bar">Waiting for User...</div>

    <div id="video-container">
        <video id="camera-feed" autoplay playsinline></video>
    </div>

    <div id="phrase-list">
        <div class="phrase active">YES</div>
        <div class="phrase">NO</div>
        <div class="phrase">I AM HUNGRY</div>
        <div class="phrase">I NEED HELP</div>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/face_landmarker_bundle.mjs";

        const video = document.getElementById("camera-feed");
        const statusBar = document.getElementById("status-bar");
        const startBtn = document.getElementById("start-btn");
        const phrases = document.querySelectorAll(".phrase");
        
        let faceLandmarker;
        let currentIndex = 0;
        let lastM = false; let lastE = false;

        startBtn.onclick = async () => {
            startBtn.style.display = "none";
            statusBar.innerText = "Loading AI Models...";
            try {
                const filesetResolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/wasm");
                faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                    baseOptions: { 
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                        delegate: "GPU" 
                    },
                    runningMode: "VIDEO"
                });

                statusBar.innerText = "Opening Camera...";
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.onloadeddata = () => {
                    statusBar.innerText = "System Active";
                    runDetection();
                };
            } catch (e) {
                statusBar.innerText = "Error: " + e.message;
                statusBar.style.background = "red";
            }
        };

        function runDetection() {
            const result = faceLandmarker.detectForVideo(video, performance.now());
            if (result.faceLandmarks && result.faceLandmarks[0]) {
                const pts = result.faceLandmarks[0];
                
                // MOUTH (Points 13 & 14)
                const m = Math.abs(pts[13].y - pts[14].y) * 1000;
                if (m > 25 && !lastM) {
                    phrases[currentIndex].classList.remove("active");
                    currentIndex = (currentIndex + 1) % phrases.length;
                    phrases[currentIndex].classList.add("active");
                    lastM = true;
                } else if (m < 20) { lastM = false; }

                // EYES (Points 159 & 145)
                const e = Math.abs(pts[159].y - pts[145].y) * 1000;
                if (e < 22 && !lastE) {
                    const msg = new SpeechSynthesisUtterance(phrases[currentIndex].innerText);
                    window.speechSynthesis.speak(msg);
                    lastE = true;
                } else if (e > 25) { lastE = false; }
            }
            requestAnimationFrame(runDetection);
        }
    </script>
</body>
</html>
