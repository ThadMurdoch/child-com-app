<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyrus Tilt-Link Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/face_landmarker_bundle.mjs" type="module"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        #status { background: #222; padding: 10px; text-align: center; font-size: 14px; border-bottom: 1px solid #444; }
        
        #choice-container { display: flex; flex: 1; width: 100%; position: relative; }
        .zone { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            font-size: clamp(3rem, 15vw, 8rem); font-weight: bold; opacity: 0.2; transition: 0.2s;
        }
        #left-zone { background: #ff0000; } /* NO */
        #right-zone { background: #00ff00; color: #000; } /* YES */
        .highlight { opacity: 1.0; transform: scale(1.02); }

        #video-wrapper { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 200px; height: 150px; border: 3px solid #ffff00; border-radius: 10px; overflow: hidden; z-index: 10;
        }
        video { width: 100%; height: 100%; transform: scaleX(-1); object-fit: cover; }
        
        #start-btn { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 40px; font-size: 2rem; background: #ffff00; color: #000; border: none; border-radius: 20px; z-index: 100; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="status">VPN ON? System Ready</div>
<button id="start-btn">TAP TO START</button>

<div id="choice-container">
    <div id="left-zone" class="zone">NO</div>
    <div id="right-zone" class="zone">YES</div>
    <div id="video-wrapper">
        <video id="webcam" autoplay playsinline></video>
    </div>
</div>

<script type="module">
    import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/face_landmarker_bundle.mjs";

    const video = document.getElementById("webcam");
    const status = document.getElementById("status");
    const startBtn = document.getElementById("start-btn");
    const leftZone = document.getElementById("left-zone");
    const rightZone = document.getElementById("right-zone");
    
    let faceLandmarker;
    let lastSelection = null;
    let dwellTimer = null;

    // Load AI Assets
    const setupAI = async () => {
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/wasm");
        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: { 
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                delegate: "GPU" 
            },
            runningMode: "VIDEO"
        });
    };

    const startCamera = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        video.srcObject = stream;
        video.addEventListener("loadeddata", predictLoop);
    };

    startBtn.addEventListener("click", async () => {
        startBtn.style.display = "none";
        status.innerText = "Initializing AI & Camera...";
        try {
            await setupAI();
            await startCamera();
            status.innerText = "ACTIVE: TILT HEAD";
            status.style.background = "green";
        } catch (err) {
            status.innerText = "Error: " + err.message;
            status.style.background = "red";
        }
    });

    function predictLoop() {
        const results = faceLandmarker.detectForVideo(video, performance.now());
        let currentSide = null;

        if (results.faceLandmarks && results.faceLandmarks[0]) {
            const nose = results.faceLandmarks[0][1]; // Nose tip point
            
            if (nose.x > 0.62) currentSide = "NO";
            else if (nose.x < 0.38) currentSide = "YES";
        }

        updateUI(currentSide);
        requestAnimationFrame(predictLoop);
    }

    function updateUI(side) {
        leftZone.classList.toggle("highlight", side === "NO");
        rightZone.classList.toggle("highlight", side === "YES");

        if (side && side !== lastSelection) {
            clearTimeout(dwellTimer);
            lastSelection = side;
            dwellTimer = setTimeout(() => {
                const utter = new SpeechSynthesisUtterance(side);
                utter.pitch = 1.3;
                window.speechSynthesis.speak(utter);
            }, 800); // 0.8 second dwell time
        } else if (!side) {
            clearTimeout(dwellTimer);
            lastSelection = null;
        }
    }
</script>
</body>
</html>
