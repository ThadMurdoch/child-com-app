<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyrus Link</title>
    <style>
        body { background: #000; color: #ff0; font-family: sans-serif; text-align: center; margin: 0; }
        #status { background: #333; color: #fff; padding: 15px; font-weight: bold; min-height: 20px; }
        .phrase { font-size: 2.5rem; padding: 25px; margin: 10px; border: 8px solid #444; border-radius: 15px; transition: 0.1s; }
        .active { border-color: #ff0; background: #222; transform: scale(1.05); }
        #start-btn { width: 90%; padding: 30px; margin: 20px; font-size: 1.5rem; background: #ff0; color: #000; border: none; font-weight: bold; border-radius: 10px; }
        #vid { width: 160px; height: 120px; background: #222; border: 3px solid #00ff00; transform: scaleX(-1); margin-top: 10px; }
    </style>
</head>
<body>

<div id="status">CAMERA CONNECTED</div>
<button id="start-btn" onclick="main()">TAP TO LOAD AI</button>

<br>
<video id="vid" autoplay playsinline muted></video>

<div id="phrases">
    <div class="phrase active">YES</div>
    <div class="phrase">NO</div>
    <div class="phrase">HELP</div>
    <div class="phrase">HUNGRY</div>
</div>

<script type="module">
    // We are now using an even more robust way to load the AI library
    import { FaceLandmarker, FilesetResolver } from "https://unpkg.com/@mediapipe/tasks-vision@0.10.0";

    window.main = async function() {
        const status = document.getElementById("status");
        const video = document.getElementById("vid");
        const btn = document.getElementById("start-btn");
        
        btn.style.display = "none";
        status.innerText = "Connecting Camera...";

        try {
            // 1. Camera Access
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            status.innerText = "Camera OK. Downloading AI Brain...";
            status.style.background = "blue";

            // 2. Load AI from the alternate UNPKG provider
            const res = await FilesetResolver.forVisionTasks("https://unpkg.com/@mediapipe/tasks-vision@0.10.0/wasm");
            const landmarker = await FaceLandmarker.createFromOptions(res, {
                baseOptions: { 
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task" 
                },
                runningMode: "VIDEO"
            });

            status.innerText = "READY: TRACKING ACTIVE";
            status.style.background = "green";

            const phrases = document.querySelectorAll(".phrase");
            let i = 0; let lastM = false;

            function loop() {
                const result = landmarker.detectForVideo(video, performance.now());
                if (result.faceLandmarks && result.faceLandmarks[0]) {
                    const p = result.faceLandmarks[0];
                    // Detection logic
                    const mouth = Math.abs(p[13].y - p[14].y) * 1000;
                    if (mouth > 30 && !lastM) {
                        phrases[i].classList.remove("active");
                        i = (i + 1) % phrases.length;
                        phrases[i].classList.add("active");
                        lastM = true;
                    } else if (mouth < 20) { lastM = false; }
                }
                requestAnimationFrame(loop);
            }
            loop();

        } catch (e) {
            status.innerText = "CONNECTION ERROR: " + e.message;
            status.style.background = "red";
            console.error(e);
        }
    }
</script>
</body>
</html>
