<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/face_landmarker_bundle.mjs" type="module"></script>
    <style>
        body { background: #000; color: #ff0; font-family: sans-serif; text-align: center; margin: 0; }
        #status { background: #444; color: #fff; padding: 20px; font-weight: bold; font-size: 1.2rem; }
        .phrase { font-size: 3rem; padding: 30px; margin: 10px; border: 5px solid #444; }
        .active { border-color: #ff0; background: #222; }
        #start-btn { width: 100%; padding: 40px; font-size: 2rem; background: #ff0; color: #000; border: none; font-weight: bold; }
        #vid { position: fixed; bottom: 10px; right: 10px; width: 100px; opacity: 0.5; transform: scaleX(-1); }
    </style>
</head>
<body>

<button id="start-btn" onclick="init()">CLICK HERE TO START</button>
<div id="status">READY - TAP BUTTON ABOVE</div>

<div id="phrases">
    <div class="phrase active">YES</div>
    <div class="phrase">NO</div>
    <div class="phrase">HELP</div>
</div>

<video id="vid" autoplay playsinline></video>

<script type="module">
    import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/face_landmarker_bundle.mjs";

    window.init = async function() {
        const status = document.getElementById("status");
        const btn = document.getElementById("start-btn");
        btn.style.display = "none";
        
        try {
            status.innerText = "1. Downloading AI... Please wait.";
            const resolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/wasm");
            
            const landmarker = await FaceLandmarker.createFromOptions(resolver, {
                baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task" },
                runningMode: "VIDEO"
            });

            status.innerText = "2. Starting Camera...";
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            const video = document.getElementById("vid");
            video.srcObject = stream;

            status.innerText = "3. SYSTEM ACTIVE";
            status.style.background = "green";

            const phrases = document.querySelectorAll(".phrase");
            let idx = 0; let lastM = false;

            function loop() {
                const result = landmarker.detectForVideo(video, performance.now());
                if (result.faceLandmarks && result.faceLandmarks[0]) {
                    const p = result.faceLandmarks[0];
                    const m = Math.abs(p[13].y - p[14].y) * 1000;
                    
                    if (m > 25 && !lastM) {
                        phrases[idx].classList.remove("active");
                        idx = (idx + 1) % phrases.length;
                        phrases[idx].classList.add("active");
                        lastM = true;
                    } else if (m < 20) { lastM = false; }
                }
                requestAnimationFrame(loop);
            }
            loop();

        } catch (e) {
            status.innerText = "ERROR: " + e.message;
            status.style.background = "red";
            console.error(e);
        }
    }
</script>
</body>
</html>
