<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/face_landmarker_bundle.mjs" type="module"></script>
    <style>
        body { background: #000; color: #ff0; font-family: sans-serif; text-align: center; margin: 0; }
        #status { background: #333; color: #fff; padding: 15px; font-weight: bold; }
        .phrase { font-size: 3rem; padding: 25px; margin: 10px; border: 8px solid #444; border-radius: 15px; }
        .active { border-color: #ff0; background: #222; }
        #start-btn { width: 100%; padding: 40px; font-size: 2rem; background: #ff0; color: #000; border: none; font-weight: bold; cursor: pointer; }
        #vid { position: fixed; top: 60px; right: 10px; width: 120px; border: 2px solid #550; transform: scaleX(-1); background: #222; }
    </style>
</head>
<body>

<button id="start-btn">1. TAP TO OPEN CAMERA</button>
<div id="status">READY: TAP BUTTON ABOVE</div>

<video id="vid" autoplay playsinline></video>

<div id="phrases">
    <div class="phrase active">YES</div>
    <div class="phrase">NO</div>
    <div class="phrase">HELP</div>
    <div class="phrase">HUNGRY</div>
</div>

<script type="module">
    import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/face_landmarker_bundle.mjs";

    const btn = document.getElementById("start-btn");
    const status = document.getElementById("status");
    const video = document.getElementById("vid");
    const phrases = document.querySelectorAll(".phrase");

    // This function starts when you click the button
    window.startCommunicationApp = async function() {
        btn.style.display = "none";
        status.innerText = "Requesting Camera...";

        try {
            // STEP A: START CAMERA IMMEDIATELY (Like the test did)
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            });
            video.srcObject = stream;
            status.innerText = "Camera OK. Now loading AI...";
            status.style.background = "blue";

            // STEP B: LOAD AI MODELS IN BACKGROUND
            const resolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/face_landmarker@0.10.0/wasm");
            const landmarker = await FaceLandmarker.createFromOptions(resolver, {
                baseOptions: { 
                    // Using an alternate model path
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task" 
                },
                runningMode: "VIDEO"
            });

            status.innerText = "SYSTEM ACTIVE - Tracking Face";
            status.style.background = "green";

            let idx = 0;
            let lastM = false;

            function detect() {
                const result = landmarker.detectForVideo(video, performance.now());
                if (result.faceLandmarks && result.faceLandmarks[0]) {
                    const p = result.faceLandmarks[0];
                    // Calculate mouth distance
                    const m = Math.abs(p[13].y - p[14].y) * 1000;
                    
                    if (m > 30 && !lastM) {
                        phrases[idx].classList.remove("active");
                        idx = (idx + 1) % phrases.length;
                        phrases[idx].classList.add("active");
                        lastM = true;
                    } else if (m < 20) { 
                        lastM = false; 
                    }
                }
                requestAnimationFrame(detect);
            }
            detect();

        } catch (err) {
            status.innerText = "CRITICAL ERROR: " + err.message;
            status.style.background = "red";
            console.error(err);
        }
    };

    // Attach the function to the button
    btn.addEventListener("click", window.startCommunicationApp);
</script>
</body>
</html>
